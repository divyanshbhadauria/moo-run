<style>

    align-items: center;

  #cam {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;

    inset: 0;

    height: 100%;

<script>
/* =====================================================================
   MOO RUN — voice-controlled cow runner with leaderboard
   ===================================================================== */

// ============== SUPABASE CONFIG (paste yours here) ==============
const SUPABASE_URL      = 'https://detlsdadwogmcawygeco.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Sq6gOLdCrHICBVK3b0anwA_JWpkMm8T';
// ================================================================

(() => {
  // ---------- Supabase client ----------
  let sb = null;
  const supabaseConfigured =
    SUPABASE_URL && !SUPABASE_URL.startsWith('YOUR_') &&
    SUPABASE_ANON_KEY && !SUPABASE_ANON_KEY.startsWith('YOUR_');
  if (supabaseConfigured && window.supabase) {
    try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }
    catch (e) { console.error('Supabase init failed:', e); }
  }

  // ---------- Cow color palette (Classic farm pack) ----------
  const COW_COLORS = {
    classic: { name: 'Classic',   body: '#fafafa', spot: '#222',    outline: '#222', tail: '#222' },
    brown:   { name: 'Brown',     body: '#8b5a3c', spot: '#f5e6c8', outline: '#4a2e1a', tail: '#3a2310' },
    white:   { name: 'White',     body: '#fafafa', spot: null,      outline: '#999',    tail: '#777'  },
    ginger:  { name: 'Ginger',    body: '#d97a3b', spot: '#fff3df', outline: '#7a3a14', tail: '#5a2a0e' },
    grey:    { name: 'Grey',      body: '#9ea7ad', spot: '#3a4148', outline: '#3a4148', tail: '#23292e' },
    pink:    { name: 'Pink',      body: '#f7b7c4', spot: '#fff',    outline: '#a4576a', tail: '#7a3e4d' },
  };
  const COW_KEYS = Object.keys(COW_COLORS);

  // ---------- DOM ----------
  const camEl       = document.getElementById('cam');
  const canvas      = document.getElementById('game');
  const scoreEl     = document.getElementById('score');
  const pitchBarEl  = document.getElementById('pitchBar');
  const pitchHzEl   = document.getElementById('pitchHz');
  const pitchLblEl  = document.getElementById('pitchLabel');
  const startScreen = document.getElementById('startScreen');
  const startBtn    = document.getElementById('startBtn');
  const gameOverEl  = document.getElementById('gameOver');
  const finalScore  = document.getElementById('finalScore');
  const restartBtn  = document.getElementById('restartBtn');
  const backToStartBtn = document.getElementById('backToStartBtn');
  const permErr     = document.getElementById('permError');
  const usernameInput = document.getElementById('usernameInput');
  const colorPicker = document.getElementById('colorPicker');
  const lbStart     = document.getElementById('lbStart');
  const lbEnd       = document.getElementById('lbEnd');
  const saveStatus  = document.getElementById('saveStatus');
  const playerTag   = document.getElementById('playerTag');
  const playerDot   = document.getElementById('playerDot');
  const playerName  = document.getElementById('playerName');

  // ---------- Persistent prefs ----------
  function loadPrefs() {
    try {
      const u = localStorage.getItem('mooRun.username') || '';
      const c = localStorage.getItem('mooRun.cowColor') || 'classic';
      usernameInput.value = u;
      return { username: u, cowColor: COW_COLORS[c] ? c : 'classic' };
    } catch (_) { return { username: '', cowColor: 'classic' }; }
  }
  function savePrefs(username, cowColor) {
    try {
      localStorage.setItem('mooRun.username', username);
      localStorage.setItem('mooRun.cowColor', cowColor);
    } catch (_) {}
  }

  // ---------- Color picker UI ----------
  let selectedColor = 'classic';
  function buildColorPicker() {
    colorPicker.innerHTML = '';
    for (const key of COW_KEYS) {
      const c = COW_COLORS[key];
      const el = document.createElement('div');
      el.className = 'swatch' + (key === selectedColor ? ' selected' : '');
      el.style.background = c.body;
      el.style.setProperty('--spot', c.spot || 'transparent');
      el.title = c.name;
      el.dataset.key = key;
      el.addEventListener('click', () => {
        selectedColor = key;
        document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('selected', s.dataset.key === key));
      });
      colorPicker.appendChild(el);
    }
  }

  // ---------- Resize / DPR ----------
  let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    if (renderer) {
      renderer.setPixelRatio(DPR);
      renderer.setSize(W, H, false);
      camera.aspect = W / H;
      camera.updateProjectionMatrix();
    }
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- Game state ----------
  const STATE = { INTRO: 0, PLAY: 1, HIT: 2, OVER: 3 };
  let state = STATE.INTRO;

  const game = {
    speed: 0.35,
    obstacles: [],
    spawnTimer: 0,
    spawnInterval: 1.6,
    score: 0,
    elapsed: 0,
    cowColorKey: 'classic',
    username: '',
    hitTime: 0, // seconds since collision flash started
    cow: {
      jumping: false, jumpTime: 0,
      ducking: false, duckTime: 0,
      runPhase: 0,
    },
  };

  // ---------- Mic / pitch detection ----------
  let audioCtx = null, analyser = null, micBuffer = null, micStream = null;
  let pitchSmooth = 0;
  let highHoldTime = 0;
  let lowHoldTime = 0;
  const TRIGGER_HOLD = 0.25;
  let voiceActive = false;
  let baselineHz = 160;
  let calibrating = false;
  let calibSamples = [];

  async function startMic() {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
    });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(micStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    micBuffer = new Float32Array(analyser.fftSize);
    src.connect(analyser);
  }

  function autoCorrelate(buf, sampleRate) {
    const SIZE = buf.length;
    let rms = 0;
    for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
    rms = Math.sqrt(rms / SIZE);
    if (rms < 0.01) return -1;
    let r1 = 0, r2 = SIZE - 1, thres = 0.2;
    for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
    for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }
    const slice = buf.subarray(r1, r2);
    const N = slice.length;
    if (N < 32) return -1;
    const c = new Array(N).fill(0);
    for (let i = 0; i < N; i++)
      for (let j = 0; j < N - i; j++) c[i] += slice[j] * slice[j + i];
    let d = 0;
    while (c[d] > c[d + 1] && d < N - 1) d++;
    let maxval = -1, maxpos = -1;
    for (let i = d; i < N; i++) { if (c[i] > maxval) { maxval = c[i]; maxpos = i; } }
    let T0 = maxpos;
    if (T0 <= 0) return -1;
    const x1 = c[T0 - 1] || 0, x2 = c[T0], x3 = c[T0 + 1] || 0;
    const a = (x1 + x3 - 2 * x2) / 2;
    const b = (x3 - x1) / 2;
    if (a) T0 = T0 - b / (2 * a);
    return sampleRate / T0;
  }

  function readPitch() {
    if (!analyser) return -1;
    analyser.getFloatTimeDomainData(micBuffer);
    return autoCorrelate(micBuffer, audioCtx.sampleRate);
  }

  function startCalibration() {
    calibrating = true;
    calibSamples = [];
    pitchLblEl.textContent = 'calibrating…';
    setTimeout(() => {
      calibrating = false;
      if (calibSamples.length > 5) {
        calibSamples.sort((a, b) => a - b);
        baselineHz = calibSamples[Math.floor(calibSamples.length / 2)];
      }
      baselineHz = Math.max(85, Math.min(280, baselineHz));
      pitchLblEl.textContent = '🎤 mic';
    }, 1200);
  }

  // ---------- Camera ----------
  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    camEl.srcObject = stream;
    await camEl.play().catch(() => {});
  }

  // ---------- 3D world geometry ----------
  // Cow sits at world Z=0. Camera is behind & above. Obstacles spawn far in -Z
  // and travel toward the cow as their normalized z (1 → 0) ticks down.
  const TRACK = { cowZ: 0.12 };               // normalized — kept for spawn/collision logic
  const WORLD = {
    trackHalfW: 1.55,
    horizonZ: -28,
    cowWorldZ: 0,
    jumpHeight: 1.4,
  };
  // Convert obstacle's normalized z to world Z (so o.z=cowZ ⇒ world Z=0).
  function obstacleWorldZ(normZ) {
    return (TRACK.cowZ - normZ) * (WORLD.cowWorldZ - WORLD.horizonZ) / (1 - TRACK.cowZ);
  }

  // ---------- three.js scene ----------
  let renderer = null, scene = null, camera = null;
  let groundTex = null, groundMesh = null;
  const FENCE_TILES_PER_SIDE = 14;
  const FENCE_TILE_SPACING = 2.2;
  let leftFenceTiles = [], rightFenceTiles = [];
  let cowGroup = null, cowLegs = null, cowMaterials = [];
  const obstacleMeshes = new Map(); // obstacle -> THREE.Group

  function initThree() {
    renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(DPR);
    renderer.setSize(W, H, false);
    renderer.outputEncoding = THREE.sRGBEncoding;

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 80);
    camera.position.set(0, 1.55, 4.0);
    camera.lookAt(0, 0.5, -3);

    scene.add(new THREE.HemisphereLight(0xffffff, 0x88aa88, 0.95));
    const sun = new THREE.DirectionalLight(0xfff3d6, 0.8);
    sun.position.set(3, 8, 5);
    scene.add(sun);

    // Ground (long grass plane, scrolling texture)
    groundTex = makeGrassTexture();
    groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping;
    groundTex.repeat.set(2, 30);
    groundMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(WORLD.trackHalfW * 2 + 0.6, 80),
      new THREE.MeshLambertMaterial({ map: groundTex })
    );
    groundMesh.rotation.x = -Math.PI / 2;
    groundMesh.position.z = -36;
    scene.add(groundMesh);

    buildSideFences();
    rebuildCow();
  }

  function makeGrassTexture() {
    const c = document.createElement('canvas');
    c.width = 256; c.height = 256;
    const cx = c.getContext('2d');
    cx.fillStyle = '#4caf50'; cx.fillRect(0, 0, 256, 256);
    for (let i = 0; i < 1000; i++) {
      cx.fillStyle = i % 2 ? '#3c8c3f' : '#62c065';
      cx.fillRect(Math.random() * 256, Math.random() * 256, 1.6, 1.6);
    }
    cx.fillStyle = 'rgba(0, 0, 0, 0.06)';
    cx.fillRect(0, 124, 256, 8);
    return new THREE.CanvasTexture(c);
  }

  function buildSideFences() {
    const woodMat   = new THREE.MeshLambertMaterial({ color: 0x8b5a2b });
    const woodDark  = new THREE.MeshLambertMaterial({ color: 0x5d3a1a });
    function makeTile(side) {
      const grp = new THREE.Group();
      const x = side * (WORLD.trackHalfW + 0.18);
      const post = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.85, 0.10), woodMat);
      post.position.set(x, 0.42, 0);
      grp.add(post);
      const cap = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.06, 0.14), woodDark);
      cap.position.set(x, 0.86, 0);
      grp.add(cap);
      const railGeom = new THREE.BoxGeometry(0.05, 0.06, FENCE_TILE_SPACING);
      const rail1 = new THREE.Mesh(railGeom, woodMat);
      rail1.position.set(x, 0.65, -FENCE_TILE_SPACING / 2);
      const rail2 = new THREE.Mesh(railGeom, woodMat);
      rail2.position.set(x, 0.30, -FENCE_TILE_SPACING / 2);
      grp.add(rail1, rail2);
      scene.add(grp);
      return grp;
    }
    for (let i = 0; i < FENCE_TILES_PER_SIDE; i++) {
      leftFenceTiles.push(makeTile(-1));
      rightFenceTiles.push(makeTile(+1));
    }
  }

  function rebuildCow() {
    if (cowGroup) { scene.remove(cowGroup); disposeObject(cowGroup); }
    const palette = COW_COLORS[game.cowColorKey] || COW_COLORS.classic;
    const built = buildCow(palette);
    cowGroup = built.group;
    cowLegs = built.legs;
    cowMaterials = built.flashMaterials;
    cowGroup.position.set(0, 0, WORLD.cowWorldZ);
    scene.add(cowGroup);
  }

  // Cow faces -Z (away from camera). Camera sits at +Z, sees its back.
  function buildCow(palette) {
    const grp = new THREE.Group();
    const bodyMat = new THREE.MeshLambertMaterial({ color: palette.body });
    const tailMat = new THREE.MeshLambertMaterial({ color: palette.tail });
    const hornMat = new THREE.MeshLambertMaterial({ color: 0xd6c08b });
    const hoofMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
    const eyeMat  = new THREE.MeshBasicMaterial({ color: 0x000000 });
    const snoutMat = new THREE.MeshLambertMaterial({ color: 0xf2c4ae });
    const flashMaterials = [bodyMat, tailMat]; // pulse these red on hit

    // Body
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.45, 0.85), bodyMat);
    body.position.y = 0.55;
    grp.add(body);

    // Spots — small flat boxes glued to body sides
    if (palette.spot) {
      const spotMat = new THREE.MeshLambertMaterial({ color: palette.spot });
      flashMaterials.push(spotMat);
      const spotPositions = [
        [-0.28, 0.65,  0.10, 0.20, 0.18, 0.04],
        [ 0.28, 0.50, -0.10, 0.22, 0.20, 0.04],
        [-0.10, 0.78,  0.20, 0.24, 0.04, 0.18],
        [ 0.18, 0.78, -0.20, 0.20, 0.04, 0.18],
        [ 0.05, 0.55,  0.32, 0.15, 0.10, 0.04],
      ];
      for (const [x, y, z, sx, sy, sz] of spotPositions) {
        const s = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz), spotMat);
        s.position.set(x, y, z);
        grp.add(s);
      }
    }

    // Head (forward = -Z)
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.40, 0.36, 0.40), bodyMat);
    head.position.set(0, 0.78, -0.55);
    grp.add(head);

    // Snout
    const snout = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.22, 0.18), snoutMat);
    snout.position.set(0, 0.66, -0.78);
    grp.add(snout);

    // Eyes
    const eyeGeom = new THREE.SphereGeometry(0.04, 8, 8);
    const eyeL = new THREE.Mesh(eyeGeom, eyeMat); eyeL.position.set(-0.10, 0.84, -0.74);
    const eyeR = new THREE.Mesh(eyeGeom, eyeMat); eyeR.position.set( 0.10, 0.84, -0.74);
    grp.add(eyeL, eyeR);

    // Ears
    const earGeom = new THREE.BoxGeometry(0.14, 0.10, 0.06);
    const earL = new THREE.Mesh(earGeom, bodyMat);
    earL.position.set(-0.22, 0.94, -0.55); earL.rotation.z = 0.5;
    const earR = new THREE.Mesh(earGeom, bodyMat);
    earR.position.set( 0.22, 0.94, -0.55); earR.rotation.z = -0.5;
    grp.add(earL, earR);

    // Horns
    const hornGeom = new THREE.CylinderGeometry(0.025, 0.05, 0.18, 6);
    const hornL = new THREE.Mesh(hornGeom, hornMat);
    hornL.position.set(-0.13, 1.02, -0.55); hornL.rotation.z = 0.35;
    const hornR = new THREE.Mesh(hornGeom, hornMat);
    hornR.position.set( 0.13, 1.02, -0.55); hornR.rotation.z = -0.35;
    grp.add(hornL, hornR);

    // Legs (with hoof at the bottom). Legs are pivoted at top so swinging
    // rotates them about the shoulder/hip rather than the foot.
    const legs = [];
    const legPositions = [
      [-0.18,  0.30],  // back-left
      [ 0.18,  0.30],  // back-right
      [-0.18, -0.30],  // front-left
      [ 0.18, -0.30],  // front-right
    ];
    for (const [x, z] of legPositions) {
      const pivot = new THREE.Group();
      pivot.position.set(x, 0.45, z);
      const leg = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.45, 0.10), bodyMat);
      leg.position.y = -0.225;
      pivot.add(leg);
      const hoof = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.06, 0.13), hoofMat);
      hoof.position.y = -0.45;
      pivot.add(hoof);
      grp.add(pivot);
      legs.push(pivot);
    }

    // Tail
    const tail = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.32, 6), tailMat);
    tail.position.set(0, 0.65, 0.45);
    tail.rotation.x = 0.4;
    grp.add(tail);
    const tailTip = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), tailMat);
    tailTip.position.set(0, 0.50, 0.58);
    grp.add(tailTip);

    return { group: grp, legs, flashMaterials };
  }

  // ---------- Obstacles (3D wooden hurdle / overhead beam) ----------
  function buildObstacleMesh(type) {
    const grp = new THREE.Group();
    const woodMat = new THREE.MeshLambertMaterial({ color: 0x8b5a2b });
    const railMat = new THREE.MeshLambertMaterial({ color: type === 'high' ? 0x6b3410 : 0xa0522d });
    if (type === 'low') {
      const postH = 0.75;
      const railY = 0.55;
      const postGeom = new THREE.BoxGeometry(0.12, postH, 0.12);
      const postL = new THREE.Mesh(postGeom, woodMat);
      postL.position.set(-WORLD.trackHalfW + 0.10, postH / 2, 0);
      const postR = new THREE.Mesh(postGeom, woodMat);
      postR.position.set( WORLD.trackHalfW - 0.10, postH / 2, 0);
      grp.add(postL, postR);
      const rail = new THREE.Mesh(
        new THREE.BoxGeometry(WORLD.trackHalfW * 2 - 0.30, 0.10, 0.10),
        railMat
      );
      rail.position.set(0, railY, 0);
      grp.add(rail);
      // diagonal brace, like a sawhorse
      const brace = new THREE.Mesh(
        new THREE.BoxGeometry(WORLD.trackHalfW * 2 - 0.40, 0.06, 0.06),
        railMat
      );
      brace.position.set(0, 0.30, 0);
      brace.rotation.z = 0.05;
      grp.add(brace);
    } else {
      const postH = 2.0;
      const postGeom = new THREE.BoxGeometry(0.12, postH, 0.12);
      const postL = new THREE.Mesh(postGeom, woodMat);
      postL.position.set(-WORLD.trackHalfW + 0.10, postH / 2, 0);
      const postR = new THREE.Mesh(postGeom, woodMat);
      postR.position.set( WORLD.trackHalfW - 0.10, postH / 2, 0);
      grp.add(postL, postR);
      const rail = new THREE.Mesh(
        new THREE.BoxGeometry(WORLD.trackHalfW * 2 - 0.30, 0.14, 0.12),
        railMat
      );
      rail.position.set(0, 1.7, 0);
      grp.add(rail);
      // little flag so it reads as the duck-under variant
      const flagMat = new THREE.MeshLambertMaterial({ color: 0x82b1ff });
      const flag = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.14, 0.02), flagMat);
      flag.position.set(0, 1.88, 0);
      grp.add(flag);
    }
    return grp;
  }

  function spawnObstacle() {
    const type = Math.random() < 0.65 ? 'low' : 'high';
    const o = { z: 1.0, type, cleared: false };
    game.obstacles.push(o);
    const mesh = buildObstacleMesh(type);
    mesh.position.z = obstacleWorldZ(o.z);
    scene.add(mesh);
    obstacleMeshes.set(o, mesh);
  }

  function removeObstacle(o) {
    const mesh = obstacleMeshes.get(o);
    if (mesh) { scene.remove(mesh); disposeObject(mesh); obstacleMeshes.delete(o); }
  }

  function disposeObject(obj) {
    obj.traverse(n => {
      if (n.geometry) n.geometry.dispose();
      if (n.material) {
        if (Array.isArray(n.material)) n.material.forEach(m => m.dispose());
        else n.material.dispose();
      }
    });
  }

  // ---------- Per-frame scene sync ----------
  function syncScene() {
    if (!scene) return;
    const c = game.cow;

    // Cow vertical motion: jump (sine arc) and duck (squash on Y).
    const jumpY = c.jumping ? Math.sin(c.jumpTime * Math.PI) * WORLD.jumpHeight : 0;
    const duckSquish = c.ducking ? 0.6 : 1.0;
    cowGroup.position.y = jumpY;
    cowGroup.scale.set(1, duckSquish, 1);

    // Run-cycle leg swing — opposite phase between front/back diagonals.
    if (cowLegs && cowLegs.length === 4) {
      const swing = c.jumping ? 0.4 : Math.sin(c.runPhase) * 0.55;
      cowLegs[0].rotation.x =  swing; // back-left
      cowLegs[1].rotation.x = -swing; // back-right
      cowLegs[2].rotation.x = -swing; // front-left
      cowLegs[3].rotation.x =  swing; // front-right
    }

    // Ground texture scroll, side fences scroll — both driven by elapsed * speed.
    const scroll = game.elapsed * game.speed * 6;
    if (groundTex) groundTex.offset.y = -scroll * 0.05;
    const cycle = ((scroll % FENCE_TILE_SPACING) + FENCE_TILE_SPACING) % FENCE_TILE_SPACING;
    for (let i = 0; i < FENCE_TILES_PER_SIDE; i++) {
      const z = -i * FENCE_TILE_SPACING + cycle + 1.5;
      leftFenceTiles[i].position.z = z;
      rightFenceTiles[i].position.z = z;
    }

    // Obstacles' world Z follows their normalized z.
    for (const o of game.obstacles) {
      const mesh = obstacleMeshes.get(o);
      if (mesh) mesh.position.z = obstacleWorldZ(o.z);
    }

    // Collision flash — pulse the cow's body materials' emissive red.
    const flashing = state === STATE.HIT;
    const amt = flashing ? (0.4 + 0.4 * Math.sin(game.hitTime * 25)) : 0;
    for (const mat of cowMaterials) {
      if (mat.emissive) mat.emissive.setRGB(amt, 0, 0);
    }
  }

  // ---------- Game loop ----------
  let last = performance.now();
  function tick(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    if (state === STATE.PLAY) update(dt);
    else if (state === STATE.HIT) updateHit(dt);
    syncScene();
    if (renderer) renderer.render(scene, camera);
    requestAnimationFrame(tick);
  }

  function updateHit(dt) {
    game.hitTime += dt;
    // keep cow run animation paused, keep world moving slowly for drama
    game.elapsed += dt * 0.3;
    if (game.hitTime >= 0.45) {
      goToGameOver();
    }
  }

  function update(dt) {
    game.elapsed += dt;
    game.cow.runPhase += dt * 12;
    game.speed = 0.35 + Math.min(0.6, game.elapsed * 0.012);
    game.spawnInterval = Math.max(0.85, 1.7 - game.elapsed * 0.015);

    let hz = readPitch();
    voiceActive = hz > 0;
    if (calibrating && hz > 60 && hz < 600) calibSamples.push(hz);

    let deviationSemi = 0;
    if (hz > 0) deviationSemi = 12 * Math.log2(hz / baselineHz);
    const target = Math.max(-1, Math.min(1, deviationSemi / 5));
    pitchSmooth = pitchSmooth * 0.6 + target * 0.4;

    const pct = Math.abs(pitchSmooth) * 50;
    const dirRight = pitchSmooth > 0;
    pitchBarEl.style.left  = dirRight ? '50%' : (50 - pct) + '%';
    pitchBarEl.style.width = pct + '%';
    pitchBarEl.style.background = dirRight ? 'var(--good)' : '#82b1ff';
    pitchHzEl.textContent = hz > 0 ? hz.toFixed(0) + ' Hz' : '—';

    const c = game.cow;
    const HIGH_TRIGGER = 0.45;
    const LOW_TRIGGER  = -0.45;
    if (voiceActive && pitchSmooth > HIGH_TRIGGER) highHoldTime += dt; else highHoldTime = 0;
    if (voiceActive && pitchSmooth < LOW_TRIGGER)  lowHoldTime  += dt; else lowHoldTime  = 0;
    if (!c.jumping && !c.ducking) {
      if (highHoldTime >= TRIGGER_HOLD) { c.jumping = true; c.jumpTime = 0; highHoldTime = 0; }
      else if (lowHoldTime >= TRIGGER_HOLD) { c.ducking = true; c.duckTime = 0; lowHoldTime = 0; }
    }
    if (c.jumping) { c.jumpTime += dt / 0.7; if (c.jumpTime >= 1) { c.jumping = false; c.jumpTime = 0; } }
    if (c.ducking) { c.duckTime += dt / 0.6; if (c.duckTime >= 1) { c.ducking = false; c.duckTime = 0; } }

    game.spawnTimer += dt;
    if (game.spawnTimer >= game.spawnInterval) { game.spawnTimer = 0; spawnObstacle(); }

    for (const o of game.obstacles) o.z -= game.speed * dt;

    for (const o of game.obstacles) {
      if (!o.cleared && Math.abs(o.z - TRACK.cowZ) < 0.04) {
        let safe = false;
        if (o.type === 'low'  && c.jumping  && c.jumpTime > 0.15 && c.jumpTime < 0.85) safe = true;
        if (o.type === 'high' && c.ducking) safe = true;
        if (safe) {
          o.cleared = true;
          game.score++;
          scoreEl.textContent = game.score;
        } else if (o.z < TRACK.cowZ - 0.02) {
          triggerCollision();
          return;
        }
      }
    }
    game.obstacles = game.obstacles.filter(o => {
      if (o.z > -0.1) return true;
      removeObstacle(o);
      return false;
    });
  }

  function triggerCollision() {
    state = STATE.HIT;
    game.hitTime = 0;
    // stop the cow's jump/duck so the red flash reads clearly
    game.cow.jumping = false;
    game.cow.ducking = false;
  }

  // ---------- Lifecycle ----------
  function resetGame() {
    for (const o of game.obstacles) removeObstacle(o);
    game.obstacles = [];
    game.spawnTimer = 0;
    game.spawnInterval = 1.6;
    game.score = 0;
    game.elapsed = 0;
    game.hitTime = 0;
    game.speed = 0.35;
    game.cow.jumping = false;
    game.cow.ducking = false;
    game.cow.jumpTime = 0;
    game.cow.duckTime = 0;
    scoreEl.textContent = '0';
    // Reset cow flash + transform.
    if (cowGroup) { cowGroup.position.y = 0; cowGroup.scale.set(1, 1, 1); }
    for (const m of cowMaterials) if (m.emissive) m.emissive.setRGB(0, 0, 0);
  }

  async function goToGameOver() {
    state = STATE.OVER;
    finalScore.textContent = game.score;
    gameOverEl.classList.remove('hidden');
    // Save score & refresh leaderboard
    saveStatus.className = '';
    saveStatus.textContent = '';
    if (sb) {
      saveStatus.textContent = 'Saving score…';
      try {
        const { error } = await sb.from('leaderboard').insert({
          username: game.username || 'anonymous',
          score: game.score,
          cow_color: game.cowColorKey,
        });
        if (error) throw error;
        saveStatus.textContent = 'Score saved ✓';
        saveStatus.className = 'ok';
      } catch (e) {
        console.error(e);
        saveStatus.textContent = 'Couldn’t save score: ' + (e.message || e);
        saveStatus.className = 'err';
      }
    } else {
      saveStatus.textContent = 'Supabase not configured — score not saved.';
    }
    await refreshLeaderboard(lbEnd);
  }

  async function refreshLeaderboard(targetEl) {
    if (!sb) {
      targetEl.innerHTML = '<li class="lb-empty">Set up Supabase to enable the leaderboard.</li>';
      return;
    }
    targetEl.innerHTML = '<li class="lb-empty">Loading…</li>';
    try {
      const { data, error } = await sb
        .from('leaderboard')
        .select('username, score, cow_color')
        .order('score', { ascending: false })
        .order('created_at', { ascending: false })
        .limit(5);
      if (error) throw error;
      if (!data || data.length === 0) {
        targetEl.innerHTML = '<li class="lb-empty">No scores yet — be the first!</li>';
        return;
      }
      const html = data.map((row, i) => {
        const rank = i + 1;
        const palette = COW_COLORS[row.cow_color] || COW_COLORS.classic;
        const safeName = (row.username || 'anonymous')
          .replace(/[<>&"']/g, ch => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[ch]));
        return `
          <li class="lb-row">
            <span class="lb-rank r${rank}">#${rank}</span>
            <span class="lb-cow" style="background:${palette.body}"></span>
            <span class="lb-name">${safeName}</span>
            <span class="lb-score">${row.score}</span>
          </li>
        `;
      }).join('');
      targetEl.innerHTML = html;
    } catch (e) {
      console.error(e);
      targetEl.innerHTML = `<li class="lb-empty">Could not load leaderboard.</li>`;
    }
  }

  async function beginGame() {
    permErr.textContent = '';
    const name = (usernameInput.value || '').trim();
    if (!name) {
      permErr.textContent = 'Please enter a name first.';
      usernameInput.focus();
      return;
    }
    game.username = name;
    game.cowColorKey = selectedColor;
    savePrefs(name, selectedColor);
    rebuildCow();

    // HUD player tag
    playerTag.style.display = 'inline-flex';
    playerName.textContent = name;
    playerDot.style.background = COW_COLORS[selectedColor].body;

    try { await startCamera(); }
    catch (e) { permErr.textContent = 'Camera permission denied — game still works without it.'; }
    try { await startMic(); }
    catch (e) {
      permErr.textContent = 'Mic permission is required to control the cow with your voice.';
      return;
    }
    startScreen.classList.add('hidden');
    gameOverEl.classList.add('hidden');
    resetGame();
    state = STATE.PLAY;
    startCalibration();
  }

  function backToStart() {
    state = STATE.INTRO;
    gameOverEl.classList.add('hidden');
    startScreen.classList.remove('hidden');
    refreshLeaderboard(lbStart);
  }

  startBtn.addEventListener('click', beginGame);
  restartBtn.addEventListener('click', beginGame);
  backToStartBtn.addEventListener('click', backToStart);

  // Keyboard fallback
  window.addEventListener('keydown', (e) => {
    if (state !== STATE.PLAY) return;
    const c = game.cow;
    if ((e.code === 'Space' || e.code === 'ArrowUp') && !c.jumping && !c.ducking) { c.jumping = true; c.jumpTime = 0; }
    else if (e.code === 'ArrowDown' && !c.jumping && !c.ducking) { c.ducking = true; c.duckTime = 0; }
  });
  // Tap fallback (top half = jump, bottom half = duck)
  document.addEventListener('pointerdown', (e) => {
    if (state !== STATE.PLAY) return;
    if (e.target.closest('button') || e.target.closest('input') || e.target.closest('.swatch')) return;
    const c = game.cow;
    if (c.jumping || c.ducking) return;
    if (e.clientY < H / 2) { c.jumping = true; c.jumpTime = 0; }
    else { c.ducking = true; c.duckTime = 0; }
  }, { passive: true });

  // ---------- Boot ----------
  const prefs = loadPrefs();
  selectedColor = prefs.cowColor;
  game.cowColorKey = selectedColor;
  buildColorPicker();
  initThree();
  resize();           // re-apply now that the renderer exists
  refreshLeaderboard(lbStart);
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
